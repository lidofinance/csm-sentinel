name: Build and Push Harbor Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Upstream release tag to build from
        required: true
        type: string
      publish_dev:
        description: Publish the image with the dev tag instead of the source release tag
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  APP: csm-sentinel
  REGISTRY: harbor.dev.k8s-dev.org
  REPOSITORY: team-csm
  REGISTRY_USER: robot$team-csm-rw
  SOURCE_REPOSITORY: skhomuti/csm-sentinel

concurrency:
  group: harbor-publish
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve image tags
        id: target
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.APP }}
          SOURCE_TAG: ${{ github.event.inputs.tag }}
          PUBLISH_DEV: ${{ github.event.inputs.publish_dev }}
        run: |
          python3 - <<'PY'
          import os

          image = os.environ["IMAGE"]
          source_tag = os.environ["SOURCE_TAG"].removeprefix("v")
          publish_tags = [source_tag]

          if os.environ.get("PUBLISH_DEV") == "true":
              publish_tags.append("dev")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write("image_tags<<EOF\n")
              fh.write("\n".join(f"{image}:{tag}" for tag in publish_tags))
              fh.write("\nEOF\n")
          PY

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ github.event.inputs.tag }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: ${{ steps.target.outputs.image_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
