name: Build and Publish Docker Image

on:
  release:
    types: [published]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          python3 - <<'PY'
          import os
          from packaging.version import Version

          image = os.environ["IMAGE"]
          event_name = os.environ["EVENT_NAME"]

          if event_name == "pull_request":
              tags = [f"{image}:pr-{os.environ['PR_NUMBER']}"]
          elif os.environ["RELEASE_IS_PRERELEASE"] == "true":
              tags = [f"{image}:{os.environ['RELEASE_TAG'].removeprefix('v')}"]
          else:
              release_tag = os.environ["RELEASE_TAG"]
              version = Version(release_tag.removeprefix("v"))
              major, minor, _ = version.release
              tags = [
                  f"{image}:{version}",
                  f"{image}:{major}.{minor}",
                  f"{image}:{major}",
                  f"{image}:latest",
              ]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write("tags<<EOF\n")
              fh.write("\n".join(tags))
              fh.write("\nEOF\n")
          PY

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          builder: ${{ steps.buildx.outputs.name }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
